name: Sync main to dev

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  sync-pr:
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse PR from main to dev
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = `${owner}:main`;
            const base = "dev";

            const openPrs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 100,
            });

            if (openPrs.data.length > 0) {
              core.info(`Existing PR found: #${openPrs.data[0].number}`);
              return;
            }

            let created;
            try {
              created = await github.rest.pulls.create({
                owner,
                repo,
                title: "chore(sync): merge main into dev",
                head: "main",
                base: "dev",
                body: [
                  "Automated sync PR to keep `dev` up to date with `main`.",
                  "",
                  "- Includes hotfixes released on `main`",
                  "- Keeps dev prerelease versioning aligned",
                ].join("\n"),
              });
            } catch (error) {
              const message = String(error?.message || "");
              if (message.includes("No commits between")) {
                core.info("No commits between main and dev; nothing to sync.");
                return;
              }
              throw error;
            }

            core.info(`Created PR #${created.data.number}`);
